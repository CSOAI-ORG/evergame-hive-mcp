name: evergame-hive-mcp
description: MEOK GAMING HIVE — Cross-Game Data Moat MCP. Aggregated market intelligence, price history, trend analysis, arbitrage signals across all supported MMOs. SOV3-enabled sovereign gaming data (your data, your control). 4 tools, blockchain-attested audit trail via meok-attestation-api. The intelligence layer of the MEOK Gaming hive within the MEOK/CSOAI 28-hive mesh.
author: MEOK AI Labs <gaming@meok.ai>
homepage: https://github.com/CSOAI-ORG/evergame-hive-mcp
license: MIT
keywords:
